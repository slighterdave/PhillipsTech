# HTTP-only fallback config used when SSL certificates are not yet available.
# Once Let's Encrypt certificates have been obtained, the main
# nginx/phillipstech.conf (HTTPS + redirect) will be installed instead.
server {
    listen 80;
    server_name phillipstech.info www.phillipstech.info;

    root /var/www/phillipstech;
    index index.html index.htm;

    location /.well-known/acme-challenge/ {
        default_type "text/plain";
    }

    # Proxy API requests and admin portal to the Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Redirect uppercase/mixed-case /ADMIN/* variants to the canonical login page
    location ~* ^/admin(/|$) {
        return 301 /admin/login;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
