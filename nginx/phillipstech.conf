# HTTP: serve ACME challenges in-place, redirect everything else to HTTPS
server {
    listen 80;
    server_name phillipstech.info www.phillipstech.info;

    root /var/www/phillipstech;

    location /.well-known/acme-challenge/ {
        # Webroot ACME challenge directory – must remain on HTTP
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name phillipstech.info www.phillipstech.info;

    # Let's Encrypt certificate (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/phillipstech.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phillipstech.info/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/phillipstech;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
