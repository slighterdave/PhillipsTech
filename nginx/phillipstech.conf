# Redirect HTTP → HTTPS, but pass ACME challenges through for cert renewal
server {
    listen 80;
    server_name phillipstech.info www.phillipstech.info;

    location /.well-known/acme-challenge/ {
        root /var/www/phillipstech;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name phillipstech.info www.phillipstech.info;

    ssl_certificate     /etc/letsencrypt/live/phillipstech.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phillipstech.info/privkey.pem;

    # Recommended SSL settings (equivalent to certbot's options-ssl-nginx.conf)
    ssl_session_cache   shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256";

    root /var/www/phillipstech;
    index index.html index.htm;

    # Proxy API requests and admin portal to the Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Redirect bare /admin and uppercase/mixed-case variants (e.g. /ADMIN/LOGIN.HTML)
    # to the canonical login page.  The ^~ block above takes priority for any
    # correctly-cased /admin/… path, so this regex never fires for those requests.
    location ~* ^/admin(/|$) {
        return 301 /admin/login;
    }


        try_files $uri $uri/ =404;
    }
}
