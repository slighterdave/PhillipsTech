# Redirect HTTP → HTTPS, but pass ACME challenges through for cert renewal
server {
    listen 80;
    server_name phillipstech.info www.phillipstech.info;

    location /.well-known/acme-challenge/ {
        root /var/www/phillipstech;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name phillipstech.info www.phillipstech.info;

    ssl_certificate     /etc/letsencrypt/live/phillipstech.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phillipstech.info/privkey.pem;

    # Recommended SSL settings (equivalent to certbot's options-ssl-nginx.conf)
    ssl_session_cache   shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256";

    root /var/www/phillipstech;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}
