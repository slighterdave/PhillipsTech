<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2.5" fill="url(#grad)"/>
  <!-- Inner circuit detail -->
  <rect x="12" y="12" width="8" height="8" rx="1.5" fill="#0f172a" opacity="0.45"/>
  <!-- Top pins -->
  <rect x="11" y="5"  width="2" height="4" rx="0.8" fill="url(#grad)"/>
  <rect x="15" y="5"  width="2" height="4" rx="0.8" fill="url(#grad)"/>
  <rect x="19" y="5"  width="2" height="4" rx="0.8" fill="url(#grad)"/>
  <!-- Bottom pins -->
  <rect x="11" y="23" width="2" height="4" rx="0.8" fill="url(#grad)"/>
  <rect x="15" y="23" width="2" height="4" rx="0.8" fill="url(#grad)"/>
  <rect x="19" y="23" width="2" height="4" rx="0.8" fill="url(#grad)"/>
  <!-- Left pins -->
  <rect x="5"  y="11" width="4" height="2" rx="0.8" fill="url(#grad)"/>
  <rect x="5"  y="15" width="4" height="2" rx="0.8" fill="url(#grad)"/>
  <rect x="5"  y="19" width="4" height="2" rx="0.8" fill="url(#grad)"/>
  <!-- Right pins -->
  <rect x="23" y="11" width="4" height="2" rx="0.8" fill="url(#grad)"/>
  <rect x="23" y="15" width="4" height="2" rx="0.8" fill="url(#grad)"/>
  <rect x="23" y="19" width="4" height="2" rx="0.8" fill="url(#grad)"/>
</svg>
