<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services – PhillipsTech Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #0066cc;
      --primary-dark: #0052a3;
      --sidebar-bg:   #1a1a2e;
      --sidebar-text: #c9d1d9;
      --sidebar-hover:#243251;
      --text:         #1a1a2e;
      --text-muted:   #6c757d;
      --border:       #dee2e6;
      --bg:           #f0f2f5;
      --white:        #ffffff;
      --success:      #198754;
      --danger:       #dc3545;
      --radius:       8px;
      --shadow:       0 2px 12px rgba(0,0,0,.07);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-brand {
      padding: 1.5rem 1.25rem 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand span { color: var(--primary); }
    .sidebar nav { flex: 1; padding: .75rem 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .625rem 1.25rem;
      cursor: pointer;
      font-size: .9rem;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      color: var(--sidebar-text);
      text-decoration: none;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--sidebar-hover);
      border-left-color: var(--primary);
      color: #fff;
    }
    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: .8rem;
      color: var(--sidebar-text);
    }
    .logout-btn {
      background: none;
      border: none;
      color: #fc8181;
      cursor: pointer;
      font-size: .85rem;
      padding: 0;
      text-decoration: underline;
    }
    .logout-btn:hover { color: #fff; }

    /* ── Main ── */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }
    .topbar h2 { font-size: 1.15rem; font-weight: 700; }
    .user-pill {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .875rem;
      color: var(--text-muted);
    }
    .user-pill strong { color: var(--text); }

    .content { padding: 1.5rem; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .add-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: .5rem 1.1rem;
      font-size: .9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: background .15s;
    }
    .add-btn:hover { background: var(--primary-dark); }

    /* ── Section card / table ── */
    .section-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .section-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h3 { font-size: 1rem; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      background: #f8f9fa;
      font-weight: 600;
      text-align: left;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }

    .currency-cell { white-space: nowrap; }
    .muted { color: var(--text-muted); }
    .desc-cell { color: var(--text-muted); font-size: .8rem; max-width: 320px; }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .25rem .6rem;
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      margin-right: .25rem;
    }
    .action-btn.edit-btn  { color: var(--primary); border-color: var(--primary); }
    .action-btn.edit-btn:hover  { background: var(--primary); color: #fff; }
    .action-btn.del-btn   { color: var(--danger); border-color: var(--danger); }
    .action-btn.del-btn:hover   { background: var(--danger); color: #fff; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      max-width: 480px;
      width: 100%;
      margin: 1rem;
      padding: 1.5rem;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.25rem; }

    .form-group { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .75rem; }
    .form-group:last-of-type { margin-bottom: 0; }
    .form-group label { font-size: .8rem; font-weight: 600; color: var(--text-muted); }
    .form-group input,
    .form-group textarea {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .45rem .65rem;
      font-size: .875rem;
      font-family: inherit;
      width: 100%;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-group .field-error { color: var(--danger); font-size: .78rem; }
    .form-hint { font-size: .78rem; color: var(--text-muted); margin-top: .2rem; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
      margin-top: 1.25rem;
    }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .45rem 1rem;
      font-size: .9rem;
      cursor: pointer;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-save {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: .45rem 1.1rem;
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-save:hover { background: var(--primary-dark); }
    .btn-save:disabled { opacity: .6; cursor: not-allowed; }

    .form-error {
      margin-top: .75rem;
      color: var(--danger);
      font-size: .85rem;
      padding: .5rem .75rem;
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 4px;
      display: none;
    }
    .form-error.visible { display: block; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand"><span>Phillips</span>Tech</div>
    <nav>
      <a class="nav-item" href="dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="clients.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        Clients
      </a>
      <a class="nav-item active" href="services.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 14h4v-4H4v4zm0 5h4v-4H4v4zM4 9h4V5H4v4zm5 5h12v-4H9v4zm0 5h12v-4H9v4zM9 5v4h12V5H9z"/></svg>
        Services
      </a>
      <a class="nav-item" href="settings.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      Signed in as <br/>
      <strong id="sidebar-email">—</strong><br/>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main">
    <div class="topbar">
      <h2>Services</h2>
      <div class="user-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        <strong id="topbar-email">—</strong>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <span id="service-count" style="font-size:.875rem;color:var(--text-muted)"></span>
        <button class="add-btn" id="add-service-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Add Service
        </button>
      </div>

      <div class="section-card">
        <div class="section-header">
          <h3>All Services</h3>
        </div>

        <div id="table-wrap">
          <table id="services-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Unit Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="services-tbody"></tbody>
          </table>
          <div id="empty-state" class="empty-state" style="display:none">
            No services yet. Click <strong>Add Service</strong> to get started.
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add / Edit Service modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h4 id="modal-title">Add Service</h4>
      <form id="service-form" novalidate>
        <div class="form-group">
          <label for="f-name">Name <span aria-hidden="true">*</span></label>
          <input type="text" id="f-name" name="name" required autocomplete="off" />
          <span class="field-error" id="err-name"></span>
        </div>
        <div class="form-group">
          <label for="f-description">Description</label>
          <textarea id="f-description" name="description" rows="3" placeholder="Brief description of this service…"></textarea>
        </div>
        <div class="form-group">
          <label for="f-unit-price">Unit Price (£)</label>
          <input type="number" id="f-unit-price" name="unit_price" min="0" step="0.01" placeholder="0.00" />
          <p class="form-hint">The price charged per invoice for this service.</p>
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-save" id="modal-save">Save Service</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const token = localStorage.getItem('admin_token');
      if (!token) { window.location.replace('/admin/login.html'); return; }

      let editingId = null;

      // ── Auth helpers ─────────────────────────────────────────────────────
      async function authFetch(url, options = {}) {
        const res = await fetch(url, {
          ...options,
          headers: { ...(options.headers || {}), Authorization: 'Bearer ' + token },
        });
        if (res.status === 401) { signOut(); }
        return res;
      }

      function signOut() {
        localStorage.removeItem('admin_token');
        window.location.replace('/admin/login.html');
      }

      document.getElementById('logout-btn').addEventListener('click', signOut);

      // ── Verify token & show email ────────────────────────────────────────
      authFetch('/api/auth/verify')
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          document.getElementById('sidebar-email').textContent = data.email;
          document.getElementById('topbar-email').textContent = data.email;
        })
        .catch(signOut);

      // ── Load services ─────────────────────────────────────────────────────
      function loadServices() {
        authFetch('/api/admin/services')
          .then(r => r.json())
          .then(data => {
            const tbody = document.getElementById('services-tbody');
            const empty = document.getElementById('empty-state');
            tbody.innerHTML = '';

            document.getElementById('service-count').textContent =
              data.length === 1 ? '1 service' : `${data.length} services`;

            if (!data || data.length === 0) {
              empty.style.display = '';
              return;
            }
            empty.style.display = 'none';

            data.forEach(row => {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td><strong>${esc(row.name)}</strong></td>
                <td class="desc-cell">${row.description ? esc(row.description) : '<span class="muted">—</span>'}</td>
                <td class="currency-cell">${formatCurrency(row.unit_price)}</td>
                <td>
                  <button class="action-btn edit-btn" data-id="${row.id}">✎ Edit</button>
                  <button class="action-btn del-btn"  data-id="${row.id}">✕</button>
                </td>
              `;
              tr.querySelector('.edit-btn').addEventListener('click', () => openModal(row));
              tr.querySelector('.del-btn').addEventListener('click', () => {
                if (confirm(`Delete service "${row.name}"?`)) deleteService(row.id);
              });
              tbody.appendChild(tr);
            });
          });
      }

      function deleteService(id) {
        authFetch(`/api/admin/services/${id}`, { method: 'DELETE' })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(() => loadServices())
          .catch(() => alert('Could not delete service.'));
      }

      // ── Modal helpers ─────────────────────────────────────────────────────
      const overlay = document.getElementById('modal-overlay');
      const form = document.getElementById('service-form');
      const formError = document.getElementById('form-error');

      function openModal(service) {
        editingId = service ? service.id : null;
        document.getElementById('modal-title').textContent = service ? 'Edit Service' : 'Add Service';
        document.getElementById('modal-save').textContent  = service ? 'Save Changes' : 'Save Service';

        form.reset();
        clearErrors();

        if (service) {
          document.getElementById('f-name').value        = service.name || '';
          document.getElementById('f-description').value = service.description || '';
          document.getElementById('f-unit-price').value  = service.unit_price != null ? service.unit_price : '';
        }

        overlay.classList.add('open');
        document.getElementById('f-name').focus();
      }

      function closeModal() {
        overlay.classList.remove('open');
        editingId = null;
      }

      document.getElementById('add-service-btn').addEventListener('click', () => openModal(null));
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

      // ── Form submission ───────────────────────────────────────────────────
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearErrors();

        const name = document.getElementById('f-name').value.trim();
        if (!name) {
          document.getElementById('err-name').textContent = 'Name is required.';
          return;
        }

        const unitPriceVal = document.getElementById('f-unit-price').value;
        const payload = {
          name,
          description: document.getElementById('f-description').value.trim() || null,
          unit_price:  unitPriceVal !== '' ? parseFloat(unitPriceVal) : 0,
        };

        const saveBtn = document.getElementById('modal-save');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';

        try {
          const url    = editingId ? `/api/admin/services/${editingId}` : '/api/admin/services';
          const method = editingId ? 'PUT' : 'POST';
          const res = await authFetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) {
            showFormError(data.error || 'An error occurred. Please try again.');
          } else {
            closeModal();
            loadServices();
          }
        } catch {
          showFormError('Network error. Please try again.');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = editingId ? 'Save Changes' : 'Save Service';
        }
      });

      // ── Helpers ───────────────────────────────────────────────────────────
      function clearErrors() {
        document.getElementById('err-name').textContent = '';
        formError.textContent = '';
        formError.classList.remove('visible');
      }

      function showFormError(msg) {
        formError.textContent = msg;
        formError.classList.add('visible');
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatCurrency(val) {
        if (val == null) return '<span class="muted">—</span>';
        return '£' + Number(val).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      // ── Init ──────────────────────────────────────────────────────────────
      loadServices();
    })();
  </script>
</body>
</html>
