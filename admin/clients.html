<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients – PhillipsTech Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #0066cc;
      --primary-dark: #0052a3;
      --sidebar-bg:   #1a1a2e;
      --sidebar-text: #c9d1d9;
      --sidebar-hover:#243251;
      --text:         #1a1a2e;
      --text-muted:   #6c757d;
      --border:       #dee2e6;
      --bg:           #f0f2f5;
      --white:        #ffffff;
      --success:      #198754;
      --danger:       #dc3545;
      --radius:       8px;
      --shadow:       0 2px 12px rgba(0,0,0,.07);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-brand {
      padding: 1.5rem 1.25rem 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand span { color: var(--primary); }
    .sidebar nav { flex: 1; padding: .75rem 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .625rem 1.25rem;
      cursor: pointer;
      font-size: .9rem;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      color: var(--sidebar-text);
      text-decoration: none;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--sidebar-hover);
      border-left-color: var(--primary);
      color: #fff;
    }
    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: .8rem;
      color: var(--sidebar-text);
    }
    .logout-btn {
      background: none;
      border: none;
      color: #fc8181;
      cursor: pointer;
      font-size: .85rem;
      padding: 0;
      text-decoration: underline;
    }
    .logout-btn:hover { color: #fff; }

    /* ── Main ── */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }
    .topbar h2 { font-size: 1.15rem; font-weight: 700; }
    .user-pill {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .875rem;
      color: var(--text-muted);
    }
    .user-pill strong { color: var(--text); }

    .content { padding: 1.5rem; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .add-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: .5rem 1.1rem;
      font-size: .9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: background .15s;
    }
    .add-btn:hover { background: var(--primary-dark); }

    /* ── Section card / table ── */
    .section-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .section-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h3 { font-size: 1rem; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      background: #f8f9fa;
      font-weight: 600;
      text-align: left;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }

    .currency-cell { white-space: nowrap; }
    .date-cell { white-space: nowrap; color: var(--text-muted); font-size: .8rem; }
    .muted { color: var(--text-muted); }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .25rem .6rem;
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      margin-right: .25rem;
    }
    .action-btn.edit-btn  { color: var(--primary); border-color: var(--primary); }
    .action-btn.edit-btn:hover  { background: var(--primary); color: #fff; }
    .action-btn.del-btn   { color: var(--danger); border-color: var(--danger); }
    .action-btn.del-btn:hover   { background: var(--danger); color: #fff; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: .5rem;
      padding: .75rem 1rem;
      border-top: 1px solid var(--border);
      font-size: .875rem;
    }
    .page-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .25rem .6rem;
      cursor: pointer;
      transition: background .15s;
    }
    .page-btn:hover:not(:disabled) { background: var(--bg); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }
    .page-info { color: var(--text-muted); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      max-width: 560px;
      width: 100%;
      margin: 1rem;
      padding: 1.5rem;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 1.25rem; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem 1rem;
    }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: .8rem; font-weight: 600; color: var(--text-muted); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .45rem .65rem;
      font-size: .875rem;
      font-family: inherit;
      width: 100%;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-group .field-error { color: var(--danger); font-size: .78rem; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
      margin-top: 1.25rem;
    }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .45rem 1rem;
      font-size: .9rem;
      cursor: pointer;
    }
    .btn-cancel:hover { background: var(--bg); }
    .btn-save {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: .45rem 1.1rem;
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-save:hover { background: var(--primary-dark); }
    .btn-save:disabled { opacity: .6; cursor: not-allowed; }

    .form-error {
      margin-top: .75rem;
      color: var(--danger);
      font-size: .85rem;
      padding: .5rem .75rem;
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 4px;
      display: none;
    }
    .form-error.visible { display: block; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand"><span>Phillips</span>Tech</div>
    <nav>
      <a class="nav-item" href="dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </a>
      <a class="nav-item active" href="clients.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        Clients
      </a>
    </nav>
    <div class="sidebar-footer">
      Signed in as <br/>
      <strong id="sidebar-email">—</strong><br/>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main">
    <div class="topbar">
      <h2>Client Management</h2>
      <div class="user-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        <strong id="topbar-email">—</strong>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <span id="client-count" style="font-size:.875rem;color:var(--text-muted)"></span>
        <button class="add-btn" id="add-client-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Add Client
        </button>
      </div>

      <div class="section-card">
        <div class="section-header">
          <h3>All Clients</h3>
        </div>

        <div id="table-wrap">
          <table id="clients-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Company</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Contract Value</th>
                <th>Payment Schedule</th>
                <th>Last Invoice</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="clients-tbody"></tbody>
          </table>
          <div id="empty-state" class="empty-state" style="display:none">
            No clients yet. Click <strong>Add Client</strong> to get started.
          </div>
          <div class="pagination" id="pagination" style="display:none">
            <button class="page-btn" id="prev-btn" disabled>← Prev</button>
            <span class="page-info" id="page-info"></span>
            <button class="page-btn" id="next-btn">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add / Edit Client modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h4 id="modal-title">Add Client</h4>
      <form id="client-form" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="f-name">Name <span aria-hidden="true">*</span></label>
            <input type="text" id="f-name" name="name" required autocomplete="off" />
            <span class="field-error" id="err-name"></span>
          </div>
          <div class="form-group">
            <label for="f-company">Company</label>
            <input type="text" id="f-company" name="company" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="f-email">Email <span aria-hidden="true">*</span></label>
            <input type="email" id="f-email" name="email" required autocomplete="off" />
            <span class="field-error" id="err-email"></span>
          </div>
          <div class="form-group">
            <label for="f-phone">Phone</label>
            <input type="tel" id="f-phone" name="phone" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="f-contract-value">Contract Value (£)</label>
            <input type="number" id="f-contract-value" name="contract_value" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label for="f-payment-schedule">Payment Schedule</label>
            <select id="f-payment-schedule" name="payment_schedule">
              <option value="">— Select —</option>
              <option value="Weekly">Weekly</option>
              <option value="Monthly">Monthly</option>
              <option value="Quarterly">Quarterly</option>
              <option value="Bi-annually">Bi-annually</option>
              <option value="Annually">Annually</option>
              <option value="On completion">On completion</option>
              <option value="Custom">Custom</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-last-invoice">Last Invoice Date</label>
            <input type="date" id="f-last-invoice" name="last_invoice_date" />
          </div>
          <div class="form-group full">
            <label for="f-notes">Notes</label>
            <textarea id="f-notes" name="notes" rows="3"></textarea>
          </div>
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-save" id="modal-save">Save Client</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function () {
      const token = localStorage.getItem('admin_token');
      if (!token) { window.location.replace('/admin/login.html'); return; }

      let currentPage = 1;
      const limit = 20;
      let editingId = null;

      // ── Auth helpers ─────────────────────────────────────────────────────
      async function authFetch(url, options = {}) {
        const res = await fetch(url, {
          ...options,
          headers: { ...(options.headers || {}), Authorization: 'Bearer ' + token },
        });
        if (res.status === 401) { signOut(); }
        return res;
      }

      function signOut() {
        localStorage.removeItem('admin_token');
        window.location.replace('/admin/login.html');
      }

      document.getElementById('logout-btn').addEventListener('click', signOut);

      // ── Verify token & show email ────────────────────────────────────────
      authFetch('/api/auth/verify')
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          document.getElementById('sidebar-email').textContent = data.email;
          document.getElementById('topbar-email').textContent = data.email;
        })
        .catch(signOut);

      // ── Load clients ─────────────────────────────────────────────────────
      function loadClients(page) {
        authFetch(`/api/admin/clients?page=${page}&limit=${limit}`)
          .then(r => r.json())
          .then(data => {
            const tbody = document.getElementById('clients-tbody');
            const empty = document.getElementById('empty-state');
            const pagination = document.getElementById('pagination');
            tbody.innerHTML = '';

            document.getElementById('client-count').textContent =
              data.total === 1 ? '1 client' : `${data.total} clients`;

            if (!data.data || data.data.length === 0) {
              empty.style.display = '';
              pagination.style.display = 'none';
              return;
            }
            empty.style.display = 'none';

            data.data.forEach(row => {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td>${esc(row.name)}</td>
                <td>${row.company ? esc(row.company) : '<span class="muted">—</span>'}</td>
                <td><a href="mailto:${esc(row.email)}">${esc(row.email)}</a></td>
                <td>${row.phone ? esc(row.phone) : '<span class="muted">—</span>'}</td>
                <td class="currency-cell">${formatCurrency(row.contract_value)}</td>
                <td>${row.payment_schedule ? esc(row.payment_schedule) : '<span class="muted">—</span>'}</td>
                <td class="date-cell">${formatDate(row.last_invoice_date)}</td>
                <td>
                  <button class="action-btn edit-btn" data-id="${row.id}">✎ Edit</button>
                  <button class="action-btn del-btn"  data-id="${row.id}">✕</button>
                </td>
              `;
              tr.querySelector('.edit-btn').addEventListener('click', () => openModal(row));
              tr.querySelector('.del-btn').addEventListener('click', () => {
                if (confirm(`Delete client "${row.name}"?`)) deleteClient(row.id);
              });
              tbody.appendChild(tr);
            });

            // Pagination
            const totalPages = Math.ceil(data.total / limit);
            if (totalPages > 1) {
              pagination.style.display = '';
              document.getElementById('page-info').textContent = `Page ${page} of ${totalPages}`;
              document.getElementById('prev-btn').disabled = page <= 1;
              document.getElementById('next-btn').disabled = page >= totalPages;
              currentPage = page;
            } else {
              pagination.style.display = 'none';
            }
          });
      }

      document.getElementById('prev-btn').addEventListener('click', () => loadClients(currentPage - 1));
      document.getElementById('next-btn').addEventListener('click', () => loadClients(currentPage + 1));

      function deleteClient(id) {
        authFetch(`/api/admin/clients/${id}`, { method: 'DELETE' })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(() => loadClients(currentPage))
          .catch(() => alert('Could not delete client.'));
      }

      // ── Modal helpers ─────────────────────────────────────────────────────
      const overlay = document.getElementById('modal-overlay');
      const form = document.getElementById('client-form');
      const formError = document.getElementById('form-error');

      function openModal(client) {
        editingId = client ? client.id : null;
        document.getElementById('modal-title').textContent = client ? 'Edit Client' : 'Add Client';
        document.getElementById('modal-save').textContent  = client ? 'Save Changes' : 'Save Client';

        form.reset();
        clearErrors();

        if (client) {
          document.getElementById('f-name').value             = client.name || '';
          document.getElementById('f-company').value          = client.company || '';
          document.getElementById('f-email').value            = client.email || '';
          document.getElementById('f-phone').value            = client.phone || '';
          document.getElementById('f-contract-value').value   = client.contract_value != null ? client.contract_value : '';
          document.getElementById('f-payment-schedule').value = client.payment_schedule || '';
          document.getElementById('f-last-invoice').value     = client.last_invoice_date || '';
          document.getElementById('f-notes').value            = client.notes || '';
        }

        overlay.classList.add('open');
        document.getElementById('f-name').focus();
      }

      function closeModal() {
        overlay.classList.remove('open');
        editingId = null;
      }

      document.getElementById('add-client-btn').addEventListener('click', () => openModal(null));
      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

      // ── Form submission ───────────────────────────────────────────────────
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearErrors();

        const name  = document.getElementById('f-name').value.trim();
        const email = document.getElementById('f-email').value.trim();
        let valid = true;

        if (!name) {
          document.getElementById('err-name').textContent = 'Name is required.';
          valid = false;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById('err-email').textContent = 'A valid email is required.';
          valid = false;
        }
        if (!valid) return;

        const contractVal = document.getElementById('f-contract-value').value;
        const payload = {
          name,
          email,
          phone:              document.getElementById('f-phone').value.trim() || null,
          company:            document.getElementById('f-company').value.trim() || null,
          contract_value:     contractVal !== '' ? parseFloat(contractVal) : null,
          payment_schedule:   document.getElementById('f-payment-schedule').value || null,
          last_invoice_date:  document.getElementById('f-last-invoice').value || null,
          notes:              document.getElementById('f-notes').value.trim() || null,
        };

        const saveBtn = document.getElementById('modal-save');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';

        try {
          const url    = editingId ? `/api/admin/clients/${editingId}` : '/api/admin/clients';
          const method = editingId ? 'PUT' : 'POST';
          const res = await authFetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) {
            showFormError(data.error || 'An error occurred. Please try again.');
          } else {
            closeModal();
            loadClients(currentPage);
          }
        } catch {
          showFormError('Network error. Please try again.');
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = editingId ? 'Save Changes' : 'Save Client';
        }
      });

      // ── Helpers ───────────────────────────────────────────────────────────
      function clearErrors() {
        document.getElementById('err-name').textContent  = '';
        document.getElementById('err-email').textContent = '';
        formError.textContent = '';
        formError.classList.remove('visible');
      }

      function showFormError(msg) {
        formError.textContent = msg;
        formError.classList.add('visible');
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatCurrency(val) {
        if (val == null) return '<span class="muted">—</span>';
        return '£' + Number(val).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function formatDate(str) {
        if (!str) return '—';
        // last_invoice_date is stored as YYYY-MM-DD; parse as local date
        const [y, m, d] = str.split('-');
        if (!y || !m || !d) return str;
        const date = new Date(Number(y), Number(m) - 1, Number(d));
        return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }

      // ── Init ──────────────────────────────────────────────────────────────
      loadClients(1);
    })();
  </script>
