<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – PhillipsTech Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #0066cc;
      --primary-dark: #0052a3;
      --sidebar-bg:   #1a1a2e;
      --sidebar-text: #c9d1d9;
      --sidebar-hover:#243251;
      --text:         #1a1a2e;
      --text-muted:   #6c757d;
      --border:       #dee2e6;
      --bg:           #f0f2f5;
      --white:        #ffffff;
      --success:      #198754;
      --danger:       #dc3545;
      --unread-badge: #e74c3c;
      --radius:       8px;
      --shadow:       0 2px 12px rgba(0,0,0,.07);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-brand {
      padding: 1.5rem 1.25rem 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand span { color: var(--primary); }
    .sidebar nav { flex: 1; padding: .75rem 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .625rem 1.25rem;
      cursor: pointer;
      font-size: .9rem;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      color: var(--sidebar-text);
      text-decoration: none;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--sidebar-hover);
      border-left-color: var(--primary);
      color: #fff;
    }
    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: .8rem;
      color: var(--sidebar-text);
    }
    .logout-btn {
      background: none;
      border: none;
      color: #fc8181;
      cursor: pointer;
      font-size: .85rem;
      padding: 0;
      text-decoration: underline;
    }
    .logout-btn:hover { color: #fff; }

    /* ── Main ── */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }
    .topbar h2 { font-size: 1.15rem; font-weight: 700; }
    .user-pill {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .875rem;
      color: var(--text-muted);
    }
    .user-pill strong { color: var(--text); }

    .content { padding: 1.5rem; }

    /* ── Stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem 1.5rem;
    }
    .stat-card .label { font-size: .8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--primary); margin-top: .25rem; }

    /* ── Contact table ── */
    .section-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .section-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h3 { font-size: 1rem; font-weight: 700; }

    .badge {
      background: var(--unread-badge);
      color: #fff;
      border-radius: 20px;
      padding: .15rem .55rem;
      font-size: .75rem;
      font-weight: 700;
    }

    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      background: #f8f9fa;
      font-weight: 600;
      text-align: left;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }
    tr.unread td { background: #f0f5ff; }
    tr.unread:hover td { background: #e8f0fe; }

    .msg-preview {
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-muted);
    }
    .date-cell { white-space: nowrap; color: var(--text-muted); font-size: .8rem; }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .25rem .6rem;
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      margin-right: .25rem;
    }
    .action-btn.read-btn { color: var(--success); border-color: var(--success); }
    .action-btn.read-btn:hover { background: var(--success); color: #fff; }
    .action-btn.del-btn  { color: var(--danger); border-color: var(--danger); }
    .action-btn.del-btn:hover  { background: var(--danger); color: #fff; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: .5rem;
      padding: .75rem 1rem;
      border-top: 1px solid var(--border);
      font-size: .875rem;
    }
    .page-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .25rem .6rem;
      cursor: pointer;
      transition: background .15s;
    }
    .page-btn:hover:not(:disabled) { background: var(--bg); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }
    .page-info { color: var(--text-muted); }

    /* ── Detail modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      max-width: 520px;
      width: 100%;
      margin: 1rem;
      padding: 1.5rem;
    }
    .modal h4 { font-size: 1rem; margin-bottom: 1rem; }
    .modal-field { margin-bottom: .75rem; font-size: .875rem; }
    .modal-field .mf-label { font-weight: 600; color: var(--text-muted); margin-bottom: .25rem; }
    .modal-msg { white-space: pre-wrap; background: var(--bg); border-radius: 4px; padding: .75rem; }
    .modal-close {
      display: block;
      margin-top: 1.25rem;
      margin-left: auto;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: .5rem 1.25rem;
      cursor: pointer;
      font-size: .9rem;
    }
    .modal-close:hover { background: var(--primary-dark); }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand"><span>Phillips</span>Tech</div>
    <nav>
      <a class="nav-item active" href="dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </a>
    </nav>
    <div class="sidebar-footer">
      Signed in as <br/>
      <strong id="sidebar-email">—</strong><br/>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main">
    <div class="topbar">
      <h2>Dashboard</h2>
      <div class="user-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        <strong id="topbar-email">—</strong>
      </div>
    </div>

    <div class="content">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Total enquiries</div>
          <div class="value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Unread</div>
          <div class="value" id="stat-unread">—</div>
        </div>
      </div>

      <!-- Contact submissions table -->
      <div class="section-card">
        <div class="section-header">
          <h3>Contact Enquiries <span class="badge" id="unread-badge" style="display:none"></span></h3>
        </div>

        <div id="table-wrap">
          <table id="contacts-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Received</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="contacts-tbody"></tbody>
          </table>
          <div id="empty-state" class="empty-state" style="display:none">
            No contact enquiries yet.
          </div>
          <div class="pagination" id="pagination" style="display:none">
            <button class="page-btn" id="prev-btn" disabled>← Prev</button>
            <span class="page-info" id="page-info"></span>
            <button class="page-btn" id="next-btn">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h4 id="modal-title">Enquiry Detail</h4>
      <div class="modal-field">
        <div class="mf-label">Name</div>
        <div id="modal-name"></div>
      </div>
      <div class="modal-field">
        <div class="mf-label">Email</div>
        <div id="modal-email"></div>
      </div>
      <div class="modal-field">
        <div class="mf-label">Message</div>
        <div class="modal-msg" id="modal-message"></div>
      </div>
      <div class="modal-field">
        <div class="mf-label">Received</div>
        <div id="modal-date"></div>
      </div>
      <button class="modal-close" id="modal-close">Close</button>
    </div>
  </div>

  <script>
    (function () {
      const token = localStorage.getItem('admin_token');
      if (!token) { window.location.replace('/admin/login.html'); return; }

      let currentPage = 1;
      const limit = 20;

      // ── Auth check ──────────────────────────────────────────────────────
      async function authFetch(url, options = {}) {
        const res = await fetch(url, {
          ...options,
          headers: { ...(options.headers || {}), Authorization: 'Bearer ' + token },
        });
        if (res.status === 401) { signOut(); }
        return res;
      }

      function signOut() {
        localStorage.removeItem('admin_token');
        window.location.replace('/admin/login.html');
      }

      document.getElementById('logout-btn').addEventListener('click', signOut);

      // ── Verify token & show email ───────────────────────────────────────
      authFetch('/api/auth/verify')
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          document.getElementById('sidebar-email').textContent = data.email;
          document.getElementById('topbar-email').textContent = data.email;
        })
        .catch(signOut);

      // ── Load stats ──────────────────────────────────────────────────────
      function loadStats() {
        authFetch('/api/admin/stats')
          .then(r => r.json())
          .then(data => {
            document.getElementById('stat-total').textContent = data.total;
            document.getElementById('stat-unread').textContent = data.unread;
            const badge = document.getElementById('unread-badge');
            if (data.unread > 0) {
              badge.textContent = data.unread + ' new';
              badge.style.display = '';
            } else {
              badge.style.display = 'none';
            }
          });
      }

      // ── Load contacts ───────────────────────────────────────────────────
      function loadContacts(page) {
        authFetch(`/api/admin/contacts?page=${page}&limit=${limit}`)
          .then(r => r.json())
          .then(data => {
            const tbody = document.getElementById('contacts-tbody');
            const empty = document.getElementById('empty-state');
            const pagination = document.getElementById('pagination');
            tbody.innerHTML = '';

            if (!data.data || data.data.length === 0) {
              empty.style.display = '';
              pagination.style.display = 'none';
              return;
            }
            empty.style.display = 'none';

            data.data.forEach(row => {
              const tr = document.createElement('tr');
              if (!row.read) tr.classList.add('unread');
              tr.innerHTML = `
                <td>${esc(row.name)}</td>
                <td><a href="mailto:${esc(row.email)}">${esc(row.email)}</a></td>
                <td class="msg-preview" title="${esc(row.message)}">${esc(row.message)}</td>
                <td class="date-cell">${formatDate(row.created_at)}</td>
                <td>
                  <button class="action-btn read-btn" data-id="${row.id}" title="Mark as read" ${row.read ? 'disabled style="opacity:.4"' : ''}>✓ Read</button>
                  <button class="action-btn del-btn" data-id="${row.id}" title="Delete">✕</button>
                </td>
              `;
              // Open detail on row click (not on buttons)
              tr.addEventListener('click', function (e) {
                if (e.target.closest('button')) return;
                openModal(row);
              });
              // Read button
              tr.querySelector('.read-btn').addEventListener('click', function (e) {
                e.stopPropagation();
                markRead(row.id, tr);
              });
              // Delete button
              tr.querySelector('.del-btn').addEventListener('click', function (e) {
                e.stopPropagation();
                if (confirm('Delete this submission?')) deleteRow(row.id, tr);
              });
              tbody.appendChild(tr);
            });

            // Pagination
            const totalPages = Math.ceil(data.total / limit);
            if (totalPages > 1) {
              pagination.style.display = '';
              document.getElementById('page-info').textContent = `Page ${page} of ${totalPages}`;
              document.getElementById('prev-btn').disabled = page <= 1;
              document.getElementById('next-btn').disabled = page >= totalPages;
              currentPage = page;
            } else {
              pagination.style.display = 'none';
            }
          });
      }

      document.getElementById('prev-btn').addEventListener('click', () => loadContacts(currentPage - 1));
      document.getElementById('next-btn').addEventListener('click', () => loadContacts(currentPage + 1));

      function markRead(id, tr) {
        authFetch(`/api/admin/contacts/${id}/read`, { method: 'PATCH' })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(() => { loadStats(); loadContacts(currentPage); })
          .catch(() => alert('Could not mark as read.'));
      }

      function deleteRow(id, tr) {
        authFetch(`/api/admin/contacts/${id}`, { method: 'DELETE' })
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(() => { loadStats(); loadContacts(currentPage); })
          .catch(() => alert('Could not delete submission.'));
      }

      // ── Modal ───────────────────────────────────────────────────────────
      const overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-close').addEventListener('click', () => overlay.classList.remove('open'));
      overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.classList.remove('open'); });

      function openModal(row) {
        document.getElementById('modal-name').textContent = row.name;
        document.getElementById('modal-email').textContent = row.email;
        document.getElementById('modal-message').textContent = row.message;
        document.getElementById('modal-date').textContent = formatDate(row.created_at);
        overlay.classList.add('open');
        if (!row.read) markRead(row.id);
      }

      // ── Helpers ─────────────────────────────────────────────────────────
      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDate(isoStr) {
        if (!isoStr) return '—';
        const d = new Date(isoStr.endsWith('Z') ? isoStr : isoStr + 'Z');
        return d.toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
      }

      // ── Init ────────────────────────────────────────────────────────────
      loadStats();
      loadContacts(1);
    })();
  </script>
</body>
</html>
