<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – PhillipsTech</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:     #0066cc;
      --primary-dark:#0052a3;
      --text:        #1a1a2e;
      --text-muted:  #6c757d;
      --border:      #dee2e6;
      --bg:          #f8f9fa;
      --white:       #ffffff;
      --error:       #dc3545;
      --radius:      8px;
      --shadow:      0 4px 24px rgba(0,0,0,.10);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand svg { width: 48px; height: 48px; margin-bottom: .75rem; }
    .brand h1 { font-size: 1.4rem; color: var(--text); font-weight: 700; }
    .brand p  { font-size: .875rem; color: var(--text-muted); margin-top: .25rem; }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .375rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .625rem .875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,102,204,.15);
    }

    .field { margin-bottom: 1.25rem; }

    .btn {
      display: block;
      width: 100%;
      padding: .75rem;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: .5rem;
    }
    .btn:hover:not(:disabled) { background: var(--primary-dark); }
    .btn:disabled { opacity: .65; cursor: not-allowed; }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fecaca;
      color: var(--error);
      border-radius: var(--radius);
      padding: .625rem .875rem;
      font-size: .875rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <!-- Simple gear/lock icon -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="24" cy="24" r="23" fill="#e8f0fe" stroke="#0066cc" stroke-width="2"/>
        <rect x="16" y="22" width="16" height="14" rx="2" fill="#0066cc"/>
        <path d="M18 22v-4a6 6 0 0 1 12 0v4" stroke="#0066cc" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <circle cx="24" cy="29" r="2" fill="white"/>
      </svg>
      <h1>PhillipsTech Admin</h1>
      <p>Sign in to access the admin portal</p>
    </div>

    <div id="error-msg" class="error-msg" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" autocomplete="email"
               placeholder="admin@phillipstech.info" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password"
               placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn" id="submit-btn">Sign in</button>
    </form>
  </div>

  <script>
    (function () {
      // If already authenticated, go straight to the dashboard
      const token = localStorage.getItem('admin_token');
      if (token) {
        fetch('/api/auth/verify', { headers: { Authorization: 'Bearer ' + token } })
          .then(r => { if (r.ok) window.location.replace('/admin/dashboard.html'); })
          .catch(() => {});
      }

      const form      = document.getElementById('login-form');
      const errorDiv  = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.add('visible');
      }
      function clearError() { errorDiv.classList.remove('visible'); }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showError('Please enter your email and password.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();

          if (!res.ok) {
            showError(data.error || 'Login failed. Please try again.');
            return;
          }

          localStorage.setItem('admin_token', data.token);
          window.location.replace('/admin/dashboard.html');
        } catch {
          showError('Unable to reach the server. Please try again.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign in';
        }
      });
    })();
  </script>
</body>
</html>
